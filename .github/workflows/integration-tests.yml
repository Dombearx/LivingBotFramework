name: Integration Tests

on:
  workflow_dispatch:
    inputs:
      test_group:
        description: "Test group to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - context_tool
          - relation_updater

jobs:
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run integration tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          case "${{ inputs.test_group }}" in
            context_tool)     uv run pytest tests/integration/test_load_context_tool.py ;;
            relation_updater) uv run pytest tests/integration/test_relation_updater.py ;;
            *)                uv run pytest tests/integration/ ;;
          esac
