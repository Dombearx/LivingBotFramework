name: Integration Tests

on:
  workflow_dispatch:
    inputs:
      test_group:
        description: "Test group to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - context_tool
          - relation_updater
          - spending_tools
          - mood_tone
          - take_photo_tool
          - discord_behavior
          - hobby_tone
          - hobby_pickup
          - story_generation

jobs:
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run integration tests
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          case "${{ inputs.test_group }}" in
            context_tool)      uv run pytest tests/integration/test_load_context_tool.py ;;
            relation_updater)  uv run pytest tests/integration/test_relation_updater.py ;;
            spending_tools)    uv run pytest tests/integration/test_spending_tools.py ;;
            mood_tone)         uv run pytest tests/integration/test_mood_tone.py ;;
            take_photo_tool)   uv run pytest tests/integration/test_take_photo_tool.py ;;
            discord_behavior)  uv run pytest tests/integration/test_discord_behavior.py ;;
            hobby_tone)        uv run pytest tests/integration/test_hobby_tone.py ;;
            hobby_pickup)      uv run pytest tests/integration/test_hobby_pickup.py ;;
            story_generation)  uv run pytest tests/integration/test_story_generation.py ;;
            *)                 uv run pytest tests/integration/ ;;
          esac
